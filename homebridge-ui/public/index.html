<!-- Custom settings UI. The schema-driven form is NOT shown: every field is
     rendered here so the layout can follow the task flow (devices first,
     housekeeping last). When adding a new config field, add it to this page
     AND to config.schema.json.
     All writes are read-modify-write against getPluginConfig() so unknown
     fields (e.g. Homebridge's _bridge child-bridge block) are preserved. -->

<!-- Dark-mode fix: Config UI X mirrors its theme into this iframe only as
     body classes (dark themes add `dark-mode`), while the injected Bootstrap
     5.3 sheet keeps :root in light theme — so .text-muted resolves to a
     near-black --bs-secondary-color, unreadable on the dark #2b2b2b card.
     Derive muted text from the card's own text colour (white) instead. -->
<style>
  body.dark-mode .text-muted {
    color: inherit !important;
    opacity: 0.7;
  }
</style>

<!-- Edit-form controls: option rows (title + description + switch), the
     cooling-only chip and the Home-app mode preview. Self-contained because
     the Bootstrap version inside the iframe varies with Config UI X; colours
     lean on currentColor/opacity where possible, with explicit
     body.dark-mode overrides where not. -->
<style>
  .dlp-field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.65; }
  .dlp-opts { border: 1px solid #dee2e6; border-radius: 8px; }
  .dlp-opt { display: flex; gap: 12px; padding: 10px 12px; align-items: flex-start; }
  .dlp-opt + .dlp-opt { border-top: 1px solid #dee2e6; }
  body.dark-mode .dlp-opts { border-color: #3e4144; }
  body.dark-mode .dlp-opt + .dlp-opt { border-top-color: #3e4144; }
  .dlp-opt-main { flex: 1 1 auto; min-width: 0; }
  .dlp-opt-title { font-weight: 600; font-size: 13px; }
  .dlp-opt-desc { font-size: 12px; opacity: 0.7; line-height: 1.5; margin-top: 1px; }
  .dlp-sw { position: relative; display: inline-block; flex-shrink: 0; margin: 2px 0 0; }
  .dlp-sw input { position: absolute; inset: 0; opacity: 0; margin: 0; cursor: pointer; }
  .dlp-sw input:disabled { cursor: default; }
  .dlp-sw .dlp-track { display: block; width: 36px; height: 20px; border-radius: 10px; background: #adb5bd; position: relative; transition: background 0.15s; }
  .dlp-sw .dlp-track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); transition: transform 0.15s; }
  .dlp-sw input:checked + .dlp-track { background: #0d6efd; }
  .dlp-sw input:checked + .dlp-track::after { transform: translateX(16px); }
  .dlp-sw input:disabled + .dlp-track { opacity: 0.5; }
  .dlp-sw input:focus-visible + .dlp-track { outline: 2px solid #0d6efd; outline-offset: 2px; }
  .dlp-chip { display: inline-block; font-size: 11px; font-weight: 600; border-radius: 999px; padding: 0 9px; margin-left: 8px; vertical-align: 1px; color: #0e7490; border: 1px solid #67c9dd; background: rgba(14, 116, 144, 0.08); }
  body.dark-mode .dlp-chip { color: #4fd0e8; border-color: #2b7f92; background: rgba(79, 208, 232, 0.1); }
  .dlp-preview { margin-top: 9px; padding: 8px 10px; background: rgba(0, 0, 0, 0.045); border-radius: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 12px; }
  body.dark-mode .dlp-preview { background: rgba(255, 255, 255, 0.07); }
  .dlp-mode-chip { font-size: 12px; font-weight: 600; border: 1px solid #0d6efd; border-radius: 999px; padding: 0 11px; }
  .dlp-mode-chip.dlp-cut { opacity: 0.45; text-decoration: line-through; border-style: dashed; border-color: currentColor; }
  .dlp-cap { flex-basis: 100%; font-size: 11.5px; opacity: 0.7; }
</style>

<!-- 1. Devices: one unified list. Configured units (climateIPs) are enriched
     with what the network scan reports (name/MAC/firmware/secure); scanned
     units not configured yet appear in the same list with an add button.
     Per-device settings live inside the device's own inline edit form as
     option rows: the 13-digit BRP072C key (climateKeys) and the cooling-only
     flag (climateCoolingOnly) — there are no separate sections for them.
     The scan runs automatically when the page opens. -->
<div class="card mb-3">
  <div class="card-body py-2">
    <strong>Devices</strong>
    <p class="text-muted small mt-1 mb-2">
      The Daikin units this plugin controls. Units found by the automatic
      network scan appear below &mdash; add one manually if it lives on
      another subnet.
    </p>
    <div class="d-flex align-items-center mb-2">
      <button type="button" id="dlpScan" class="btn btn-primary btn-sm" style="margin-right: 8px;">Scan network</button>
      <button type="button" id="dlpDeviceAdd" class="btn btn-outline-secondary btn-sm">Add manually</button>
      <span id="dlpScanStatus" class="text-muted small" style="margin-left: 12px;"></span>
    </div>
    <div id="dlpDeviceRows"></div>
  </div>
</div>

<!-- 2. Advanced: housekeeping nobody touches day-to-day. -->
<div class="card mb-3">
  <div class="card-body py-2">
    <a href="#" id="dlpAdvToggle" class="d-flex align-items-center text-decoration-none" style="color: inherit;">
      <span id="dlpAdvChevron" style="margin-right: 8px;">&#9656;</span>
      <strong>Advanced</strong>
    </a>
    <div id="dlpAdvBody" style="display: none;">
      <div class="form-group mt-2 mb-2">
        <label for="dlpName" class="small mb-1">Plugin name (shown in the Homebridge log)</label>
        <input type="text" id="dlpName" class="form-control form-control-sm" placeholder="Daikin Local Platform">
      </div>
      <div class="custom-control custom-checkbox form-check mb-1">
        <input type="checkbox" id="dlpDebug" class="custom-control-input form-check-input">
        <label for="dlpDebug" class="custom-control-label form-check-label small">Debug mode — print debugging information to the log</label>
      </div>
    </div>
  </div>
</div>

<script>
(async () => {

  const platformName = 'Daikin Local Platform';
  const defaultName = 'Daikin Local Platform';

  // Inline SVG icons (Font Awesome availability inside the custom-UI iframe
  // is not guaranteed, so the page stays self-contained).
  const ICONS = {
    edit: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2 14 4.5 5 13.5l-3 .5.5-3L11.5 2z"/></svg>',
    done: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8.5 6 12 13.5 4"/></svg>',
    remove: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4h11M6 4V2.5h4V4M4 4l.8 9.5h6.4L12 4M6.5 6.5v5M9.5 6.5v5"/></svg>',
    add: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2.5v11M2.5 8h11"/></svg>',
  };

  function iconButton(icon, className, title) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `btn btn-sm ${className} px-2`;
    button.title = title;
    button.style.lineHeight = '1';
    button.innerHTML = ICONS[icon];
    return button;
  }

  // Working copies of the fields this page owns. A device row carries its
  // secure-adapter key ({ value, key? } plus transient edit-state flags);
  // climateKeys entries that match no device survive in orphanKeys until the
  // user adopts them back or deletes them — never dropped silently.
  let deviceRows = [];              // [{ value: "<ip[:port]>", key?, coolOnly?, editing?, ... }]
  let orphanKeys = [];              // [{ ip, key }]
  let orphanCoolingOnly = [];       // climateCoolingOnly entries matching no device
  let nameValue = defaultName;
  let debugValue = false;
  let lastScan = [];                // devices reported by the last scan
  let scanDone = false;             // at least one scan finished

  const bareIp = (entry) => String(entry).trim().split(':')[0];
  const rowKey = (row) => (row.key || '').trim();

  // ------------------------------------------------------------------
  // Config I/O (read-modify-write; preserves fields we don't own)
  // ------------------------------------------------------------------

  async function sync() {
    const pluginConfig = await homebridge.getPluginConfig();
    if (pluginConfig.length === 0) {
      pluginConfig.push({ platform: platformName });
    }
    const config = pluginConfig[0];

    config.name = nameValue.trim() || defaultName;
    config.climateIPs = deviceRows.map((row) => row.value.trim()).filter((value) => value !== '');
    config.debugMode = debugValue;

    // The platform looks keys up by the exact climateIPs entry (port
    // included), so device-attached keys are written under row.value;
    // orphan entries are preserved verbatim.
    const keyEntries = deviceRows
      .filter((row) => row.value.trim() !== '' && rowKey(row) !== '')
      .map((row) => ({ [row.value.trim()]: rowKey(row) }))
      .concat(orphanKeys.map((orphan) => ({ [orphan.ip]: orphan.key })));

    if (keyEntries.length > 0) {
      config.climateKeys = keyEntries;
    } else {
      delete config.climateKeys;
    }

    // Cooling-only flags, written as the device's exact climateIPs entry
    // (port included) — the form the platform looks up. Entries matching no
    // device are preserved verbatim.
    const coolingOnlyEntries = deviceRows
      .filter((row) => row.value.trim() !== '' && row.coolOnly === true)
      .map((row) => row.value.trim())
      .concat(orphanCoolingOnly);

    if (coolingOnlyEntries.length > 0) {
      config.climateCoolingOnly = coolingOnlyEntries;
    } else {
      delete config.climateCoolingOnly;
    }

    await homebridge.updatePluginConfig(pluginConfig);
  }

  // ------------------------------------------------------------------
  // Devices — one unified list of configured + discovered units
  // ------------------------------------------------------------------

  const deviceRowsHost = document.getElementById('dlpDeviceRows');
  const deviceAddButton = document.getElementById('dlpDeviceAdd');
  const scanButton = document.getElementById('dlpScan');
  const scanStatus = document.getElementById('dlpScanStatus');

  const configuredIPs = () => deviceRows.map((row) => bareIp(row.value));
  const scanInfoFor = (entry) => lastScan.find((device) => device.ip === bareIp(entry));

  // A device typed or discovered anew picks up a leftover key saved for the
  // same address (e.g. the device entry was removed and later re-added).
  function adoptOrphanKey(row) {
    if (rowKey(row) !== '') {
      return;
    }
    const index = orphanKeys.findIndex((orphan) =>
      orphan.ip === row.value.trim() || bareIp(orphan.ip) === bareIp(row.value));
    if (index !== -1) {
      row.key = orphanKeys[index].key;
      orphanKeys.splice(index, 1);
    }
  }

  // Same idea for a leftover cooling-only flag: a device removed and later
  // re-added under the same address gets its flag back.
  function adoptOrphanCoolingOnly(row) {
    if (row.coolOnly === true) {
      return;
    }
    const index = orphanCoolingOnly.findIndex((entry) =>
      entry.trim() === row.value.trim() || bareIp(entry) === bareIp(row.value));
    if (index !== -1) {
      row.coolOnly = true;
      orphanCoolingOnly.splice(index, 1);
    }
  }

  // Right-aligned action area; inline styles so the alignment does not
  // depend on which Bootstrap version Config UI X injects into the iframe.
  function actionsBox() {
    const box = document.createElement('div');
    box.style.marginLeft = 'auto';
    box.style.display = 'flex';
    box.style.alignItems = 'center';
    box.style.flexShrink = '0';
    return box;
  }

  function deviceLabel(info, fallback, opts = {}) {
    const label = document.createElement('div');
    label.style.marginRight = '8px';
    label.style.minWidth = '0';

    const secure = (info && info.secure) || opts.secure === true;
    const title = document.createElement('div');
    title.textContent = (info ? (info.name || '(unnamed)') : fallback) + (secure ? ' \u{1F512}' : '');
    if (opts.coolOnly) {
      const chip = document.createElement('span');
      chip.className = 'dlp-chip';
      chip.textContent = '❄ cool only';
      title.appendChild(chip);
    }
    label.appendChild(title);

    const detailText = opts.detail || (info
      ? [
        fallback,
        info.mac,
        info.firmware ? 'fw ' + info.firmware : '',
        info.type,
      ].filter((part) => part).join(' · ')
      : '');

    if (detailText) {
      const detail = document.createElement('div');
      detail.className = 'text-muted small';
      detail.textContent = detailText;
      label.appendChild(detail);
    }

    return label;
  }

  function badge(text, className) {
    const span = document.createElement('span');
    span.className = `badge ${className}`;
    span.style.marginRight = '6px';
    span.textContent = text;
    return span;
  }

  // Builders for the edit form's option rows (title + description + switch)
  // so every per-device setting reads the same way and a future option is
  // just one more row.
  function switchControl(checked, title) {
    const label = document.createElement('label');
    label.className = 'dlp-sw';
    label.title = title;
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = checked;
    const track = document.createElement('span');
    track.className = 'dlp-track';
    label.appendChild(input);
    label.appendChild(track);
    return { label, input };
  }

  function optionRow(title, desc) {
    const opt = document.createElement('div');
    opt.className = 'dlp-opt';
    const main = document.createElement('div');
    main.className = 'dlp-opt-main';
    const titleLine = document.createElement('div');
    titleLine.className = 'dlp-opt-title';
    titleLine.textContent = title;
    const descLine = document.createElement('div');
    descLine.className = 'dlp-opt-desc';
    descLine.textContent = desc;
    main.appendChild(titleLine);
    main.appendChild(descLine);
    opt.appendChild(main);
    return { opt, main };
  }

  // Inline edit form: the IP, then one option row per per-device setting.
  // The 13-digit key appears when the unit is known to be secure
  // (row.editSecure: scan says so, or a key already exists — then the switch
  // is locked on) or the user switches it on (row.secureManual — covers
  // secure units the scan cannot reach, e.g. across subnets). Cooling only
  // (row.coolOnly) hides Heating and Auto in HomeKit for cool-only models
  // whose firmware advertises heating (issue #16).
  function renderEditForm(row, index) {
    const form = document.createElement('div');
    form.className = 'border-top py-1';

    const finishEditing = () => {
      row.value = row.value.trim();
      row.key = rowKey(row);
      if (row.key === '') {
        delete row.key;
      }
      delete row.editing;
      delete row.editSecure;
      delete row.secureManual;
      delete row.focus;
      delete row.focusKey;
      if (row.value === '') {
        deviceRows.splice(index, 1);
      } else {
        adoptOrphanKey(row);
        adoptOrphanCoolingOnly(row);
      }
      renderDevices();
      sync();
    };

    const onEnter = (event) => {
      if (event.key === 'Enter') {
        finishEditing();
      }
    };

    const ipLabel = document.createElement('div');
    ipLabel.className = 'dlp-field-label';
    ipLabel.textContent = 'IP address';
    form.appendChild(ipLabel);

    const ipLine = document.createElement('div');
    ipLine.style.display = 'flex';
    ipLine.style.alignItems = 'center';
    ipLine.style.marginTop = '4px';

    const ipInput = document.createElement('input');
    ipInput.type = 'text';
    ipInput.className = 'form-control form-control-sm';
    ipInput.style.flex = '1 1 auto';
    ipInput.style.marginRight = '8px';
    ipInput.placeholder = 'IP address (e.g. 10.1.10.120)';
    ipInput.value = row.value;
    ipInput.addEventListener('input', () => { row.value = ipInput.value; sync(); });
    ipInput.addEventListener('keydown', onEnter);
    ipLine.appendChild(ipInput);

    const doneButton = iconButton('done', 'btn-outline-success', 'Done');
    doneButton.addEventListener('click', finishEditing);
    ipLine.appendChild(doneButton);
    form.appendChild(ipLine);

    const optionsLabel = document.createElement('div');
    optionsLabel.className = 'dlp-field-label';
    optionsLabel.style.margin = '10px 0 4px';
    optionsLabel.textContent = 'Options';
    form.appendChild(optionsLabel);

    const options = document.createElement('div');
    options.className = 'dlp-opts';
    form.appendChild(options);

    // Secure adapter
    const secure = optionRow('Secure adapter',
      'A BRP072C adapter paired with the Daikin Comfort Control app — needs '
      + 'the 13-digit key printed on the sticker next to the SSID.');
    const secureSwitch = switchControl(row.editSecure === true || row.secureManual === true, 'Secure adapter');
    if (row.editSecure) {
      // The scan reported the unit secure, or a key already exists — the
      // plugin needs the key either way, so the switch is locked on.
      secureSwitch.input.disabled = true;
    } else {
      secureSwitch.input.addEventListener('change', () => {
        row.secureManual = secureSwitch.input.checked;
        if (secureSwitch.input.checked) {
          row.focusKey = true;
        } else {
          // The key field only appeared this session, so any key in it was
          // just typed — switching off discards it.
          delete row.key;
        }
        renderDevices();
        sync();
      });
    }
    secure.opt.appendChild(secureSwitch.label);
    options.appendChild(secure.opt);

    let keyInput = null;
    if (row.editSecure || row.secureManual) {
      keyInput = document.createElement('input');
      keyInput.type = 'text';
      keyInput.className = 'form-control form-control-sm';
      keyInput.style.maxWidth = '260px';
      keyInput.style.marginTop = '8px';
      keyInput.placeholder = '13-digit key';
      keyInput.value = row.key || '';
      keyInput.addEventListener('input', () => { row.key = keyInput.value; sync(); });
      keyInput.addEventListener('keydown', onEnter);
      secure.main.appendChild(keyInput);
    }

    // Cooling only
    const cooling = optionRow('Cooling only',
      'Hide Heating and Auto in the Home app. For cool-only models whose '
      + 'firmware still reports heating — common in Singapore, Malaysia and India.');
    const coolingSwitch = switchControl(row.coolOnly === true, 'Cooling only');

    const preview = document.createElement('div');
    preview.className = 'dlp-preview';
    const previewIntro = document.createElement('span');
    previewIntro.textContent = 'Home app will offer:';
    preview.appendChild(previewIntro);
    const modeChips = ['Auto', 'Heat', 'Cool'].map((mode) => {
      const chip = document.createElement('span');
      chip.className = 'dlp-mode-chip';
      chip.textContent = mode;
      preview.appendChild(chip);
      return chip;
    });
    const previewCaption = document.createElement('span');
    previewCaption.className = 'dlp-cap';
    preview.appendChild(previewCaption);
    cooling.main.appendChild(preview);

    const renderPreview = () => {
      const on = coolingSwitch.input.checked;
      modeChips[0].classList.toggle('dlp-cut', on);
      modeChips[1].classList.toggle('dlp-cut', on);
      previewCaption.textContent = on
        ? 'Heating and Auto hidden by this setting.'
        : 'As auto-detected from the unit.';
    };
    renderPreview();

    coolingSwitch.input.addEventListener('change', () => {
      if (coolingSwitch.input.checked) {
        row.coolOnly = true;
      } else {
        delete row.coolOnly;
      }
      renderPreview();
      sync();
    });
    cooling.opt.appendChild(coolingSwitch.label);
    options.appendChild(cooling.opt);

    return { form, ipInput, keyInput };
  }

  function renderDevices() {
    deviceRowsHost.innerHTML = '';

    let pendingFocus = null;

    // Configured units first, in config order.
    deviceRows.forEach((row, index) => {
      if (row.editing) {
        const { form, ipInput, keyInput } = renderEditForm(row, index);
        if (row.focusKey && keyInput) {
          delete row.focusKey;
          pendingFocus = keyInput;
        } else if (row.focus) {
          delete row.focus;
          pendingFocus = ipInput;
        }
        deviceRowsHost.appendChild(form);
        return;
      }

      const line = document.createElement('div');
      line.className = 'd-flex align-items-center border-top py-1';

      const info = scanInfoFor(row.value);
      line.appendChild(deviceLabel(info, row.value, { secure: rowKey(row) !== '', coolOnly: row.coolOnly === true }));

      const actions = actionsBox();

      if (info && info.secure && rowKey(row) === '') {
        actions.appendChild(badge('needs key', 'badge-warning bg-warning text-dark'));
      }
      if (!info && scanDone) {
        actions.appendChild(badge('no reply', 'badge-light bg-light text-dark'));
      }

      const editButton = iconButton('edit', 'btn-outline-secondary', 'Edit device');
      editButton.style.marginRight = '6px';
      editButton.addEventListener('click', () => {
        row.editing = true;
        row.focus = true;
        row.editSecure = Boolean(info && info.secure) || rowKey(row) !== '';
        renderDevices();
      });
      actions.appendChild(editButton);

      const removeButton = iconButton('remove', 'btn-outline-danger', 'Remove device');
      removeButton.addEventListener('click', () => {
        deviceRows.splice(index, 1);
        renderDevices();
        sync();
      });
      actions.appendChild(removeButton);

      line.appendChild(actions);
      deviceRowsHost.appendChild(line);
    });

    // Units the scan found but that are not configured yet.
    const known = configuredIPs();
    for (const device of lastScan.filter((device) => !known.includes(device.ip))) {
      const line = document.createElement('div');
      line.className = 'd-flex align-items-center border-top py-1';

      line.appendChild(deviceLabel(device, device.ip));

      const actions = actionsBox();
      actions.appendChild(badge('found', 'badge-info bg-info'));

      const addButton = iconButton('add', 'btn-outline-success', 'Add to configuration');
      addButton.addEventListener('click', () => addDiscovered(device));
      actions.appendChild(addButton);

      line.appendChild(actions);

      deviceRowsHost.appendChild(line);
    }

    // Leftover climateKeys entries with no matching device: kept visible so
    // they are never dropped silently — adopt them back or delete them.
    orphanKeys.forEach((orphan, index) => {
      const line = document.createElement('div');
      line.className = 'd-flex align-items-center border-top py-1';

      line.appendChild(deviceLabel(null, orphan.ip, { detail: 'Saved adapter key with no matching device', secure: true }));

      const actions = actionsBox();
      actions.appendChild(badge('unused key', 'badge-light bg-light text-dark'));

      const addButton = iconButton('add', 'btn-outline-success', 'Add as device (keeps the key)');
      addButton.addEventListener('click', () => {
        deviceRows.push({ value: orphan.ip, key: orphan.key });
        orphanKeys.splice(index, 1);
        renderDevices();
        sync();
      });
      actions.appendChild(addButton);

      const removeButton = iconButton('remove', 'btn-outline-danger', 'Delete key');
      removeButton.addEventListener('click', () => {
        orphanKeys.splice(index, 1);
        renderDevices();
        sync();
      });
      actions.appendChild(removeButton);

      line.appendChild(actions);
      deviceRowsHost.appendChild(line);
    });

    if (deviceRowsHost.children.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'text-muted small mb-0';
      empty.textContent = scanDone
        ? 'No devices yet - none replied to the scan. Add one manually, or check the subnet / Docker bridge network.'
        : 'No devices configured yet.';
      deviceRowsHost.appendChild(empty);
    }

    if (pendingFocus) {
      pendingFocus.focus();
    }
  }

  function addDiscovered(device) {
    if (configuredIPs().includes(device.ip)) {
      return;
    }

    const row = { value: device.ip };
    adoptOrphanKey(row);
    adoptOrphanCoolingOnly(row);
    deviceRows.push(row);

    if (device.secure && rowKey(row) === '') {
      // Open the new row's edit form with the key field focused, so the key
      // is typed right where the device lives.
      row.editing = true;
      row.editSecure = true;
      row.focusKey = true;
      homebridge.toast.warning(`${device.name || device.ip} is a secure adapter - enter its 13-digit key, then save.`, 'Key required');
    } else {
      homebridge.toast.success(`${device.name || device.ip} added - remember to save.`, 'Device added');
    }

    renderDevices();
    sync();
  }

  deviceAddButton.addEventListener('click', () => {
    deviceRows.push({ value: '', editing: true, focus: true });
    renderDevices();
  });

  async function runScan() {
    scanButton.disabled = true;
    scanStatus.textContent = 'Scanning network…';
    try {
      const result = await homebridge.request('/discover');
      lastScan = result.devices || [];
      scanDone = true;
      scanStatus.textContent = lastScan.length > 0
        ? `${lastScan.length} device(s) responded`
        : 'No devices replied';
    } catch (e) {
      scanStatus.textContent = 'Scan failed';
      homebridge.toast.error(e.message || String(e), 'Scan failed');
    } finally {
      scanButton.disabled = false;
      // Don't stomp an in-progress edit: the auto-scan can finish while the
      // user is typing an IP or key. The list refreshes on their next action
      // anyway.
      if (!deviceRowsHost.contains(document.activeElement)) {
        renderDevices();
      }
    }
  }

  scanButton.addEventListener('click', runScan);

  // ------------------------------------------------------------------
  // 2. Advanced
  // ------------------------------------------------------------------

  const advToggle = document.getElementById('dlpAdvToggle');
  const advChevron = document.getElementById('dlpAdvChevron');
  const advBody = document.getElementById('dlpAdvBody');
  const nameInput = document.getElementById('dlpName');
  const debugInput = document.getElementById('dlpDebug');

  advToggle.addEventListener('click', (event) => {
    event.preventDefault();
    const expanded = advBody.style.display === 'none';
    advBody.style.display = expanded ? '' : 'none';
    advChevron.innerHTML = expanded ? '&#9662;' : '&#9656;';
  });

  nameInput.addEventListener('input', () => { nameValue = nameInput.value; sync(); });
  debugInput.addEventListener('change', () => { debugValue = debugInput.checked; sync(); });

  // ------------------------------------------------------------------
  // Init
  // ------------------------------------------------------------------

  const pluginConfig = await homebridge.getPluginConfig();
  const config = pluginConfig.length > 0 ? pluginConfig[0] : {};

  deviceRows = Array.isArray(config.climateIPs)
    ? config.climateIPs.map((entry) => ({ value: String(entry) }))
    : [];

  // Attach each climateKeys entry to its device row — exact entry first (the
  // form the platform looks up), then bare-IP as a repair for configs written
  // when keys were a separate section. Leftovers become orphan rows.
  for (const entry of config.climateKeys || []) {
    if (entry && typeof entry === 'object') {
      for (const ip of Object.keys(entry)) {
        if (typeof entry[ip] !== 'string') {
          continue;
        }
        const row = deviceRows.find((candidate) => candidate.value.trim() === ip.trim() && rowKey(candidate) === '')
          || deviceRows.find((candidate) => bareIp(candidate.value) === bareIp(ip) && rowKey(candidate) === '');
        if (row) {
          row.key = entry[ip];
        } else {
          orphanKeys.push({ ip: ip, key: entry[ip] });
        }
      }
    }
  }

  // Attach climateCoolingOnly entries to their device rows — exact entry
  // first, then bare IP, same repair rules as climateKeys. Leftovers ride
  // along in orphanCoolingOnly (and are written back verbatim) so a device
  // removed and re-added later gets its flag back.
  for (const entry of config.climateCoolingOnly || []) {
    if (typeof entry !== 'string' || entry.trim() === '') {
      continue;
    }
    const row = deviceRows.find((candidate) => candidate.value.trim() === entry.trim() && candidate.coolOnly !== true)
      || deviceRows.find((candidate) => bareIp(candidate.value) === bareIp(entry) && candidate.coolOnly !== true);
    if (row) {
      row.coolOnly = true;
    } else {
      orphanCoolingOnly.push(entry);
    }
  }

  nameValue = typeof config.name === 'string' && config.name !== '' ? config.name : defaultName;
  debugValue = config.debugMode === true;

  nameInput.value = nameValue;
  debugInput.checked = debugValue;
  renderDevices();

  // Scan right away so the page opens with live device information.
  runScan();
})();
</script>
